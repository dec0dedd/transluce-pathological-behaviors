defaults:
  - ppo_trainer
  - _self_

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: false

data:
  train_files: prepared/train.parquet
  val_files: prepared/train.parquet
  train_batch_size: 1
  max_prompt_length: 1024
  max_response_length: 1024
  filter_overlong_prompts: true

actor_rollout_ref:
  model:
    path: Qwen/Qwen2.5-3B
    use_remove_padding: true
    enable_gradient_checkpointing: true 
  actor:
    grad_clip: 1.0
    optim:
      lr: 1e-6
    ppo_mini_batch_size: 1
    ppo_micro_batch_size_per_gpu: 2
    kl_loss_coef: 0.001
    strategy: fsdp
    fsdp_config:
      param_offload: true
      optimizer_offload: true
      model_dtype: bf16
  rollout:
    name: vllm
    n: 256
    temperature: 0.8 
    top_p: 0.9
    max_model_len: 2560
    tensor_model_parallel_size: 1
    max_num_seqs: 32
    gpu_memory_utilization: 0.25
    log_prob_micro_batch_size_per_gpu: 4
    engine_kwargs:
      vllm:
        max_model_len: 2560
        enable_prefix_caching: true
  ref:
    log_prob_micro_batch_size_per_gpu: 2
    fsdp_config:
      param_offload: true

reward_model:
  reward_manager: naive

custom_reward_function:
  path: src/reward_wrapper.py
  name: compute_score

trainer:
  balance_batch: true
  logger: ["console", "wandb"]
  project_name: transluce_repro
  experiment_name: new_rubric
  n_gpus_per_node: 1
  total_epochs: 200
  val_before_train: false
  test_freq: -1
